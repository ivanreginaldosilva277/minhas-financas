<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle Financeiro Mensal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .mes-atual { text-align: center; font-weight: bold; color: #3498db; text-transform: uppercase; margin-bottom: 20px; }
        
        .resumo-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { padding: 10px; border-radius: 8px; text-align: center; color: white; font-size: 0.9em; font-weight: bold; }
        .total { background: #34495e; }
        .pago { background: #2ecc71; }
        .pendente { background: #e74c3c; }

        .add-category { display: flex; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .add-category input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        .btn-add { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #2980b9; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: #7f8c8d; text-align: left; padding: 10px; border-bottom: 2px solid #eee; font-size: 0.85em; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        
        input[type="number"] { width: 100px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-check { cursor: pointer; padding: 8px 12px; border: none; border-radius: 4px; background: #eee; color: #777; font-weight: bold; min-width: 85px; }
        .btn-check.active { background: #2ecc71; color: white; }
        .btn-del { background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 1.4em; padding: 0 10px; }
        .btn-del:hover { color: #c0392b; }
        
        .btn-excel { width: 100%; background: #217346; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 25px; font-size: 1em; }
        .btn-excel:hover { background: #1a5a37; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Minhas Finanças</h2>
        <div id="mesExibicao" class="mes-atual"></div>

        <div class="resumo-cards">
            <div class="card total">Total do Mês: <br><span id="resumoTotal">R$ 0,00</span></div>
            <div class="card pago">Já Pago: <br><span id="resumoPago">R$ 0,00</span></div>
            <div class="card pendente">Falta Pagar: <br><span id="resumoPendente">R$ 0,00</span></div>
        </div>

        <div class="add-category">
            <input type="text" id="novaCatNome" placeholder="Nova conta (Ex: Farmácia, IPVA...)">
            <button class="btn-add" onclick="adicionarCategoria()">+ Adicionar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Categoria</th>
                    <th>Valor (R$)</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>

        <button class="btn-excel" onclick="exportToExcel()">📥 Baixar Planilha para Excel</button>
    </div>

    <script>
        // Lista inicial sugerida por você
        const categoriasPadrao = ["Aluguel", "Pensão", "Escolinha", "Apartamento", "Condomínio", "Prestação Tenda", "Água", "Luz", "Internet", "Celular"];
        
        const data = new Date();
        const mesAnoAtual = `${data.getMonth() + 1}/${data.getFullYear()}`;
        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        document.getElementById('mesExibicao').innerText = `${mesesNomes[data.getMonth()]} de ${data.getFullYear()}`;

        // Busca dados do mês específico no computador do usuário
        let dadosFinanceiros = JSON.parse(localStorage.getItem(`financas_v2_${mesAnoAtual}`));

        // Se for um mês novo, cria a lista baseada no que você pediu
        if (!dadosFinanceiros) {
            dadosFinanceiros = categoriasPadrao.map(cat => ({ nome: cat, valor: 0, pago: false }));
            salvar();
        }

        function renderizar() {
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = '';
            let totalGeral = 0, totalPago = 0;

            dadosFinanceiros.forEach((item, index) => {
                totalGeral += item.valor;
                if (item.pago) totalPago += item.valor;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 500; color: #34495e;">${item.nome}</td>
                    <td><input type="number" step="0.01" value="${item.valor}" onchange="atualizarValor(${index}, this.value)"></td>
                    <td>
                        <button class="btn-check ${item.pago ? 'active' : ''}" onclick="togglePago(${index})">
                            ${item.pago ? '✔ Pago' : 'Pendente'}
                        </button>
                    </td>
                    <td><button class="btn-del" onclick="removerCategoria(${index})" title="Excluir">&times;</button></td>
                `;
                corpo.appendChild(tr);
            });

            // Atualiza os cartões de resumo
            document.getElementById('resumoTotal').innerText = `R$ ${totalGeral.toFixed(2).replace('.',',')}`;
            document.getElementById('resumoPago').innerText = `R$ ${totalPago.toFixed(2).replace('.',',')}`;
            const falta = totalGeral - totalPago;
            document.getElementById('resumoPendente').innerText = `R$ ${falta.toFixed(2).replace('.',',')}`;
        }

        function atualizarValor(index, valor) {
            dadosFinanceiros[index].valor = parseFloat(valor) || 0;
            salvar();
            renderizar();
        }

        function togglePago(index) {
            dadosFinanceiros[index].pago = !dadosFinanceiros[index].pago;
            salvar();
            renderizar();
        }

        function adicionarCategoria() {
            const input = document.getElementById('novaCatNome');
            const nome = input.value.trim();
            if (nome === "") return;
            
            dadosFinanceiros.push({ nome: nome, valor: 0, pago: false });
            input.value = '';
            salvar();
            renderizar();
        }

        function removerCategoria(index) {
            if(confirm(`Tem certeza que deseja excluir "${dadosFinanceiros[index].nome}"?`)) {
                dadosFinanceiros.splice(index, 1);
                salvar();
                renderizar();
            }
        }

        function salvar() {
            localStorage.setItem(`financas_v2_${mesAnoAtual}`, JSON.stringify(dadosFinanceiros));
        }

        function exportToExcel() {
            // Adiciona o BOM para o Excel reconhecer caracteres especiais (acentos)
            let csv = "\uFEFF";
            csv += "Categoria;Valor Planejado;Status\n";
            
            dadosFinanceiros.forEach(item => {
                const status = item.pago ? "Pago" : "Pendente";
                csv += `${item.nome};${item.valor.toFixed(2).replace('.',',')};${status}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Financas_${mesesNomes[data.getMonth()]}_${data.getFullYear()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        renderizar();
    </script>
</body>
</html>
